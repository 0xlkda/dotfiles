source ~/code/dotfiles/tmux/tmux.reset.conf

# General
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g status-position top
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"
set -sg escape-time 0
set -g focus-events on
set -s set-clipboard on
set -g monitor-activity on
set -g visual-activity off

# Size windows to the most recently active client, so the current device
# always gets its full screen even when a smaller client is still attached
set -g window-size latest
set -wg aggressive-resize on

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Theme
set -g status on
set -g status-left-length 42
set -g status-right-length 150
set -g window-status-separator " "
set -g window-status-activity-style none
set -g window-status-bell-style none

run-shell "~/code/dotfiles/tmux/theme.sh keep"
bind T run-shell "~/code/dotfiles/tmux/theme.sh toggle"

# Keybindings
set -wg mode-keys vi

# Enter "join window by digit" mode
bind-key -T prefix C-j switch-client -T joinwin

# Cancel joinwin mode
bind-key -T joinwin Escape switch-client -T prefix
bind-key -T joinwin C-c switch-client -T prefix

# Join current pane to window index 0..9, then return to normal prefix table
run-shell 'for i in $(seq 0 9); do tmux bind-key -T joinwin $i "join-pane -h -t :$i ; select-window -t :$i"; done'

## Copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/code/dotfiles/tmux/osc52-copy.sh"
bind p run-shell "tmux set-buffer -- \"$(pbpaste)\" && tmux paste-buffer"

## Navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "send-keys -R C-l"
bind j select-pane -t :.-
bind k select-pane -t :.+
bind C-d break-pane
bind ` switch-client -l
bind s choose-tree -w
bind h switch-client -t =lkda

## Pane resize
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

## Windows
bind -r < run 'tmux swap-window -d -t #{e|-|:#I,1}'
bind -r > run 'tmux swap-window -d -t #{e|+|:#I,1}'
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}" \; command-prompt -p "Name for this new window: " "rename-window '%%'"

## Utilities
bind C-a set-window-option synchronize-panes
bind R source-file ~/code/dotfiles/tmux/tmux.conf \; display "Config Reloaded!"
bind Z run-shell '\
  self="#{pane_id}"; \
  for p in $(tmux list-panes -a -F "##{pane_id}:##{pane_current_command}"); do \
    id="${p%%:*}"; cmd="${p##*:}"; \
    [ "$id" = "$self" ] && continue; \
    [ "$cmd" != "zsh" ] && continue; \
    tmux send-keys -t "$id" "reload" Enter; \
  done; \
  tmux display "Reloaded zsh"'

# Per-session scroll: all sessions default to normal (0); reverse is opt-in per
# session via prefix+S. Bindings branch on #{@scroll-reversed} at event time.
set -g @scroll-reversed 0
set -g @scrolled-in 0
set-hook -g client-attached 'run-shell "~/code/dotfiles/tmux/scroll-direction.sh detect #{client_pid}"'
bind S run-shell "~/code/dotfiles/tmux/scroll-direction.sh toggle"

# Auto-cancel gated by @scrolled-in so iPad inertia can't cancel on first wheel
bind-key -T root WheelUpPane if-shell -F "#{pane_in_mode}" {
  if-shell -F "#{@scroll-reversed}" {
    send-keys -X -N 2 scroll-down
    if-shell -F "#{&&:#{==:#{scroll_position},0},#{@scrolled-in}}" {
      send-keys -X cancel
      set @scrolled-in 0
    }
  } {
    send-keys -X -N 3 scroll-up
    if-shell -F "#{>:#{scroll_position},0}" { set @scrolled-in 1 }
  }
} {
  if-shell -F "#{mouse_any_flag}" { send-keys -M } {
    if-shell -F "#{@scroll-reversed}" {
      send-keys -M
    } {
      copy-mode
      send-keys -X -N 3 scroll-up
      set @scrolled-in 1
    }
  }
}

bind-key -T root WheelDownPane if-shell -F "#{pane_in_mode}" {
  if-shell -F "#{@scroll-reversed}" {
    send-keys -X -N 2 scroll-up
    if-shell -F "#{>:#{scroll_position},0}" { set @scrolled-in 1 }
  } {
    send-keys -X -N 3 scroll-down
    if-shell -F "#{&&:#{==:#{scroll_position},0},#{@scrolled-in}}" {
      send-keys -X cancel
      set @scrolled-in 0
    }
  }
} {
  if-shell -F "#{mouse_any_flag}" { send-keys -M } {
    if-shell -F "#{@scroll-reversed}" {
      copy-mode
      send-keys -X -N 2 scroll-up
      set @scrolled-in 1
    } {
      send-keys -M
    }
  }
}

unbind-key -T copy-mode-vi WheelUpPane
unbind-key -T copy-mode-vi WheelDownPane
unbind-key -T copy-mode WheelUpPane
unbind-key -T copy-mode WheelDownPane

bind-key -T root MouseDown1Status if-shell -F '#{==:#{mouse_status_range},follow_other}' {
  run-shell "cur='#{session_name}'; target=\$(tmux list-clients -F '##{client_session}' | grep '^lkda' | grep -vx \"\$cur\" | head -1); [ -z \"\$target\" ] && target=lkda; win=\$(tmux display-message -p -t \"\$target\" '##{window_index}'); tmux select-window -t \"\$cur:\$win\""
} {
  select-window -t=
}

run-shell "~/code/dotfiles/tmux/scroll-direction.sh detect #{client_pid}"

# GõTelex per-pane VN typing mode
set-hook -g pane-focus-in          'run-shell -b "~/code/dotfiles/tmux/telex-scope.sh #{pane_id}"'
set-hook -g pane-focus-out         'run-shell -b "~/code/dotfiles/tmux/telex-scope.sh"'
set-hook -g session-window-changed 'run-shell -b "~/code/dotfiles/tmux/telex-scope.sh #{pane_id}"'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'
